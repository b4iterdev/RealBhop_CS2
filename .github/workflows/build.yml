name: Build

on:
  push:
    branches:
      - dev
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev or latest main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && 'main' || github.ref }}

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore RealBhopCS2.sln

      - name: Build
        run: dotnet build RealBhopCS2.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test RealBhopCS2.sln --configuration Release --no-build

      - name: Publish plugin
        run: dotnet publish src/RealBhopCS2/RealBhopCS2.csproj --configuration Release --no-build --output artifacts/RealBhopCS2/publish

      - name: Package plugin (lean)
        run: |
          rm -rf artifacts/RealBhopCS2/package
          mkdir -p artifacts/RealBhopCS2/package
          cp artifacts/RealBhopCS2/publish/RealBhopCS2.dll artifacts/RealBhopCS2/package/
          if [ -f artifacts/RealBhopCS2/publish/RealBhopCS2.deps.json ]; then cp artifacts/RealBhopCS2/publish/RealBhopCS2.deps.json artifacts/RealBhopCS2/package/; fi
          if [ -f artifacts/RealBhopCS2/publish/RealBhopCS2.runtimeconfig.json ]; then cp artifacts/RealBhopCS2/publish/RealBhopCS2.runtimeconfig.json artifacts/RealBhopCS2/package/; fi

      - name: Package plugin
        run: |
          cd artifacts/RealBhopCS2/package
          zip -r "../../RealBhopCS2-${{ github.sha }}.zip" .

      - name: Upload dev build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: RealBhopCS2-${{ github.sha }}
          path: artifacts/RealBhopCS2-${{ github.sha }}.zip
          if-no-files-found: error

      - name: Upload release asset
        if: github.event_name == 'release'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" "artifacts/RealBhopCS2-${{ github.sha }}.zip" --clobber
